version: '3'
services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: always
    ports:
      - 8095:80
    volumes:
      - /srv/samba/shared_drive:/srv     # SAMBA - NAS
      - ./filebrowser.db:/database
      - ./settings.json:/config
    environment:
      - PUID=1001
